<script src="https://cdnjs.cloudflare.com/ajax/libs/livekit-client/2.15.7/livekit-client.umd.js" integrity="sha512-SsMgKAHzioCmBltf4+6xpVWzCSz2cK2QXP2CgGxqRg17sJkWk7aVmNO4yEGQr/c47BqYPYWiAr1+hXXgP4MB2g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    const getToken = async function getToken(){
        const response = await fetch("http://localhost:8000/api/token", {
            method:"POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "room_name": null,
                "participant_identity": null,
                "participant_name": null,
                "participant_metadata": null,
                "participant_attributes": null,
                "room_config": null
            })
        })
        
        const data = await response.json()

        return data
    }

    const start = async function connectToRoom(){
        const data = await getToken()
        const room = new LivekitClient.Room();
        console.log(data.server_url,data.participant_token)
        room.connect(data.server_url,data.participant_token)
    }

    start()
    
</script>
